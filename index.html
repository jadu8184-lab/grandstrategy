    // ─── VIEW 3: SYLLABUS TRACKER ───
    function SyllabusView({ state, setState }) {
      const safeSyllabus = state.syllabus || [];
      const [activePaper, setActivePaper] = useState(safeSyllabus.length > 0 ? safeSyllabus[0].id : null);
      
      const [editingTopic, setEditingTopic] = useState(null);
      const [editValue, setEditValue] = useState("");
      const [newTopic, setNewTopic] = useState("");

      const currentPaperData = safeSyllabus.find(p => p.id === activePaper);
      const progressMap = state.syllabusProgress || {};

      const updateProgress = (topicName, level) => {
        haptic('light');
        setState(s => ({
          ...s,
          syllabusProgress: {
            ...(s.syllabusProgress || {}),
            [topicName]: level
          }
        }));
      };

      const handleAddTopic = () => {
        if (!newTopic.trim()) { haptic('error'); return; }
        haptic('medium');
        setState(s => {
          const updatedSyllabus = s.syllabus.map(p => {
            if (p.id === activePaper) return { ...p, topics: [...p.topics, newTopic] };
            return p;
          });
          return { ...s, syllabus: updatedSyllabus };
        });
        setNewTopic("");
      };

      const startEdit = (topic) => {
        haptic('light');
        setEditingTopic(topic);
        setEditValue(topic);
      };

      const handleSaveEdit = (oldTopicName) => {
        if (!editValue.trim() || editValue === oldTopicName) {
          setEditingTopic(null);
          return;
        }
        haptic('success');
        setState(s => {
          const updatedSyllabus = s.syllabus.map(p => {
            if (p.id === activePaper) {
               return { ...p, topics: p.topics.map(t => t === oldTopicName ? editValue : t) };
            }
            return p;
          });
          
          const newProgress = { ...s.syllabusProgress };
          if (newProgress[oldTopicName] !== undefined) {
             newProgress[editValue] = newProgress[oldTopicName];
             delete newProgress[oldTopicName];
          }

          return { ...s, syllabus: updatedSyllabus, syllabusProgress: newProgress };
        });
        setEditingTopic(null);
      };

      const handleDeleteTopic = (topicName) => {
        haptic('medium');
        if(!confirm("Are you sure you want to delete this topic?")) return;
        haptic('heavy');
        setState(s => {
          const updatedSyllabus = s.syllabus.map(p => {
             if (p.id === activePaper) return { ...p, topics: p.topics.filter(t => t !== topicName) };
             return p;
          });
          return { ...s, syllabus: updatedSyllabus };
        });
      };

      if (!currentPaperData) return null;

      const totalTopics = currentPaperData.topics.length;
      const scores = currentPaperData.topics.map(t => progressMap[t] || 0);
      const maxScore = totalTopics * 3;
      const currentScore = scores.reduce((a,b)=>a+b, 0);
      const paperPercent = maxScore > 0 ? ((currentScore / maxScore) * 100).toFixed(0) : 0;

      return (
        <div className="animate-in">
          <PageHeader
            eyebrow="Intelligence map"
            title="Syllabus Matrix"
            description="Track readiness by paper and topic — edit scores as you revise."
          />

          <div className="paper-tabs">
            {safeSyllabus.map(p => (
              <button key={p.id} className={`paper-tab ${activePaper === p.id ? 'active' : ''}`} onClick={() => { setActivePaper(p.id); setEditingTopic(null); haptic('light'); }}>
                {p.name}
              </button>
            ))}
          </div>

          <div className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 24px" }}>
            <div>
              <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Syne', sans-serif" }}>{currentPaperData.name} Preparedness</div>
              <div style={{ fontSize: 12, color: "var(--text-dim)", marginTop: 4 }}>Track tactical readiness level across all topics. Edit, delete, or add custom topics below.</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div className="font-mono" style={{ fontSize: 24, fontWeight: 700, color: "var(--accent)" }}>{paperPercent}%</div>
              <div style={{ fontSize: 10, color: "var(--text-dim)", textTransform: "uppercase", fontWeight: 700 }}>Completion</div>
            </div>
          </div>

          <div className="card" style={{ padding: "16px 24px" }}>
            {currentPaperData.topics.map((topic, i) => {
              const lvl = progressMap[topic] || 0;
              const isEditing = editingTopic === topic;

              return (
                <div key={`${i}-${topic}`} className="topic-row stagger-item" style={{ animationDelay: `${Math.min(i, 20) * 0.03}s`, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 0", borderBottom: "1px solid var(--border)" }}>
                  
                  {isEditing ? (
                    <div style={{ flex: 1, display: "flex", gap: 12, paddingRight: 20 }}>
                      <input className="input-base" style={{ padding: "8px 12px", margin: 0 }} value={editValue} onChange={(e) => setEditValue(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSaveEdit(topic)} autoFocus />
                      <button className="btn primary" style={{ width: "auto", padding: "8px 16px" }} onClick={() => handleSaveEdit(topic)}>Save</button>
                      <button className="btn" style={{ width: "auto", padding: "8px 16px" }} onClick={() => setEditingTopic(null)}>Cancel</button>
                    </div>
                  ) : (
                    <div style={{ flex: 1, paddingRight: 20, fontSize: 14, lineHeight: 1.5, color: lvl > 0 ? "var(--text)" : "var(--text-dim)", display: "flex", alignItems: "center" }}>
                      {topic}
                      <div className="topic-controls">
                        <button className="action-btn" title="Edit" onClick={() => startEdit(topic)}>✏️</button>
                        <button className="action-btn delete" title="Delete" onClick={() => handleDeleteTopic(topic)}>🗑️</button>
                      </div>
                    </div>
                  )}

                  {!isEditing && (
                    <div style={{ display: "flex", gap: 6 }}>
                      <button className={`prep-btn lvl-0 ${lvl === 0 ? 'active' : ''}`} onClick={() => updateProgress(topic, 0)}>None</button>
                      <button className={`prep-btn lvl-1 ${lvl === 1 ? 'active' : ''}`} onClick={() => updateProgress(topic, 1)}>Low</button>
                      <button className={`prep-btn lvl-2 ${lvl === 2 ? 'active' : ''}`} onClick={() => updateProgress(topic, 2)}>Med</button>
                      <button className={`prep-btn lvl-3 ${lvl === 3 ? 'active' : ''}`} onClick={() => updateProgress(topic, 3)}>High</button>
                    </div>
                  )}
                </div>
              );
            })}
            
            <div style={{ display: "flex", gap: 12, marginTop: 24, paddingTop: 8 }}>
              <input className="input-base" placeholder="Add custom topic to this paper..." value={newTopic} onChange={e=>{setNewTopic(e.target.value); haptic('tick');}} onKeyDown={e=>e.key==='Enter'&&handleAddTopic()} />
              <button className="btn" style={{ width: "auto", padding: "12px 24px", background: "var(--hover)" }} onClick={handleAddTopic}>Add Topic</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── VIEW 4: DEEP WORK (POMODORO) ───
    function FocusView({ state, setState }) {
      const [timeLeft, setTimeLeft] = useState(25 * 60);
      const [isActive, setIsActive] = useState(false);
      const [isWork, setIsWork] = useState(true);
      const [audioCtx, setAudioCtx] = useState(null);
      const [noiseNode, setNoiseNode] = useState(null);
      const [isPlayingNoise, setIsPlayingNoise] = useState(false);
      const [isFullscreen, setIsFullscreen] = useState(false);

      useEffect(() => {
        const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }, []);

      const toggleFullscreen = () => {
        haptic('medium');
        const elem = document.getElementById("focus-container");
        if (!document.fullscreenElement) {
          elem.requestFullscreen().catch(err => console.log(err));
        } else {
          document.exitFullscreen();
        }
      };

      useEffect(() => {
        let interval = null;
        if (isActive && timeLeft > 0) {
          interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
        } else if (isActive && timeLeft === 0) {
          clearInterval(interval);
          setIsActive(false);
          haptic('success');
          if (isWork) {
            setState(s => ({
              ...s,
              pomodoros: [...(s.pomodoros || []), { id: Date.now(), date: todayStr() }]
            }));
            showToast("Deep work session complete. Take a breather, Commander.", "success");
            setMode(false);
          } else {
             showToast("Break over. Back to the frontlines!", "info");
             setMode(true);
          }
        }
        return () => clearInterval(interval);
      }, [isActive, timeLeft, isWork, setState]);

      const setMode = (work) => {
        haptic('light');
        setIsWork(work);
        setTimeLeft(work ? 25 * 60 : 5 * 60);
        setIsActive(false);
      };

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      };

      const toggleNoise = () => {
        haptic('light');
        if (isPlayingNoise && noiseNode) {
          noiseNode.stop();
          noiseNode.disconnect();
          setNoiseNode(null);
          setIsPlayingNoise(false);
        } else {
          const ctx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          if (!audioCtx) setAudioCtx(ctx);
          
          const bufferSize = ctx.sampleRate * 2;
          const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const output = buffer.getChannelData(0);
          let lastOut = 0;
          for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            output[i] = (lastOut + (0.02 * white)) / 1.02;
            lastOut = output[i];
            output[i] *= 3.5;
          }
          const node = ctx.createBufferSource();
          node.buffer = buffer;
          node.loop = true;
          
          const filter = ctx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.value = 400; 
          
          node.connect(filter);
          filter.connect(ctx.destination);
          node.start();
          
          setNoiseNode(node);
          setIsPlayingNoise(true);
        }
      };
      
      useEffect(() => {
        return () => {
          if (noiseNode) {
            noiseNode.stop();
            noiseNode.disconnect();
          }
        };
      }, [noiseNode]);

      const todaysPomodoros = (state.pomodoros || []).filter(p => p.date === todayStr()).length;

      return (
        <div className="animate-in" id="focus-container" style={{ 
          background: isFullscreen ? 'var(--bg)' : 'transparent',
          height: isFullscreen ? '100vh' : 'auto',
          display: 'flex',
          flexDirection: 'column',
          justifyContent: isFullscreen ? 'center' : 'flex-start',
          alignItems: isFullscreen ? 'center' : 'stretch',
          padding: isFullscreen ? '20px' : '0',
          transition: 'all 0.5s ease'
        }}>
          {!isFullscreen && (
            <PageHeader
              eyebrow="Hyperfocus protocol"
              title="Deep Work Center"
              description="25-minute focus blocks with optional ambient sound."
            />
          )}

          <div className="card" style={{ 
            marginTop: isFullscreen ? 0 : 0, 
            textAlign: 'center', 
            padding: isFullscreen ? '60px 40px' : '40px',
            maxWidth: isFullscreen ? '600px' : '100%',
            width: '100%',
            border: isFullscreen ? 'none' : '1px solid var(--border)',
            background: isFullscreen ? 'transparent' : 'var(--bg2)',
          }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 32 }}>
              <SegControl
                value={isWork ? "focus" : "break"}
                onChange={(id) => setMode(id === "focus")}
                options={[{ id: "focus", label: "Focus 25m" }, { id: "break", label: "Break 5m" }]}
              />
            </div>

            <div className="font-mono" style={{ fontSize: isFullscreen ? 140 : 80, fontWeight: 700, color: isWork ? "var(--accent)" : "var(--success)", lineHeight: 1, marginBottom: 32, transition: 'all 0.5s ease', textShadow: isActive ? `0 0 24px ${isWork ? 'var(--accent-mid)' : 'var(--success-soft)'}` : 'none' }}>
              {formatTime(timeLeft)}
            </div>

            <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 40 }}>
              <button className="btn primary" style={{ width: "120px" }} onClick={() => { setIsActive(!isActive); haptic('medium'); }}>
                {isActive ? "PAUSE" : "START"}
              </button>
              <button className="btn" style={{ width: "120px" }} onClick={() => { setIsActive(false); setTimeLeft(isWork ? 25*60 : 5*60); haptic('light'); }}>
                RESET
              </button>
            </div>

            <div style={{ display: "flex", justifyContent: "center", gap: 24, paddingTop: 24, borderTop: "1px solid var(--border)" }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer", opacity: isPlayingNoise ? 1 : 0.5, transition: "all 0.2s" }} onClick={toggleNoise}>
                <div style={{ width: 48, height: 48, borderRadius: "50%", background: isPlayingNoise ? "var(--accent-soft)" : "var(--bg2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, transition: "all 0.2s" }}>
                  🎧
                </div>
                <span style={{ fontSize: 10, color: "var(--text-dim)", fontWeight: 700, textTransform: "uppercase" }}>Ambient</span>
              </div>
              
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer", transition: "all 0.2s" }} onClick={toggleFullscreen}>
                <div style={{ width: 48, height: 48, borderRadius: "50%", background: "var(--bg2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, transition: "all 0.2s" }}>
                  ⛶
                </div>
                <span style={{ fontSize: 10, color: "var(--text-dim)", fontWeight: 700, textTransform: "uppercase" }}>Fullscreen</span>
              </div>
            </div>
          </div>

          {!isFullscreen && (
            <div className="grid-2">
               <div className="card" style={{ display: "flex", alignItems: "center", gap: 20 }}>
                 <div style={{ fontSize: 40, animation: isActive ? "celebratePop 2s infinite" : "none" }}>🔥</div>
                 <div>
                   <div className="subtitle" style={{ marginBottom: 4 }}>Daily Focus Streak</div>
                   <div className="font-syne" style={{ fontSize: 32, fontWeight: 800, color: "var(--accent)" }}>{todaysPomodoros} <span style={{ fontSize: 14, color: "var(--text-dim)", fontWeight: "normal", fontFamily: "'DM Sans', sans-serif" }}>Sessions</span></div>
                 </div>
               </div>
               <div className="card">
                 <span className="subtitle">Deep Work Doctrine</span>
                 <p style={{ fontSize: 13, color: "var(--text-muted)", lineHeight: 1.6 }}>
                   True strategic advantage is forged in uninterrupted silence. Engage the hyperfocus protocol to isolate your objective. Let the ambient low-pass hum block out tactical noise. Each 25-minute engagement brings you closer to ultimate victory.
                 </p>
               </div>
            </div>
          )}
        </div>
      );
    }

    // ─── VIEW 5: PLANNER (STANDALONE) ───
    function PlannerView({ state, setState }) {
      const [newTodo, setNewTodo] = useState("");

      const handleAddTodo = () => {
        if (!newTodo) { haptic('error'); return; }
        haptic('light');
        setState(s => ({ ...s, todos: [...(s.todos || []), { id: Date.now(), text: newTodo, done: false }] }));
        setNewTodo("");
      };

      const toggleTodo = (id) => {
        setState(s => {
          const targetTodo = s.todos.find(t => t.id === id);
          if (targetTodo && !targetTodo.done) haptic('medium'); 
          else haptic('light');
          
          const todos = (s.todos || []).map(t => t.id === id ? { ...t, done: !t.done } : t);
          let points = s.points || 0;
          if (targetTodo && !targetTodo.done) points += 5; 
          else if (targetTodo && targetTodo.done) points -= 5; 

          return { ...s, todos, points };
        });
      };

      return (
        <div className="animate-in">
          <PageHeader
            eyebrow="Task management"
            title="Operations Planner"
            description="Break the syllabus into daily objectives and earn points when you complete them."
          />

          <div className="card">
            <div style={{ display: "flex", gap: 12, marginBottom: 24 }}>
              <input className="input-base" placeholder="Define new objective..." value={newTodo} onChange={e=>{setNewTodo(e.target.value); haptic('tick');}} onKeyDown={e=>e.key==='Enter'&&handleAddTodo()} />
              <button className="btn primary" style={{ width: "auto", padding: "12px 32px" }} onClick={handleAddTodo}>Add Objective</button>
            </div>
            
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {(state.todos || []).map((t, i) => (
                <div key={t.id} className="stagger-item" style={{ animationDelay: `${i * 0.05}s`, display: "flex", alignItems: "center", gap: 16, background: "var(--bg2)", padding: "16px 20px", borderRadius: 8, opacity: t.done ? 0.5 : 1, transition: "all 0.3s ease" }}>
                  <input type="checkbox" checked={t.done} onChange={() => toggleTodo(t.id)} style={{ width: 20, height: 20, accentColor: "var(--accent)", cursor: "pointer", transform: t.done ? "scale(1.1)" : "scale(1)", transition: "transform 0.2s" }} />
                  <span style={{ textDecoration: t.done ? "line-through" : "none", flex: 1, fontSize: 15 }}>{t.text}</span>
                  <button onClick={()=>{ haptic('heavy'); setState(s=>({...s, todos: s.todos.filter(x=>x.id!==t.id)}))}} className="action-btn delete" style={{ background: "none", border: "none", color: "var(--danger)", cursor: "pointer", fontSize: 16 }}>✕</button>
                </div>
              ))}
              {(!state.todos || state.todos.length === 0) && (
                <div className="empty-state">
                  <div className="empty-state-icon">📝</div>
                  <div className="empty-state-title">No objectives yet</div>
                  <p className="empty-state-desc">Add a task above to plan your next study moves.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── VIEW 6: REWARDS (STANDALONE) ───
    function RewardsView({ state, setState }) {
      const [newReward, setNewReward] = useState("");
      const [newCost, setNewCost] = useState(50);
      const [celebratingId, setCelebratingId] = useState(null);

      const handleAddReward = () => {
        if (!newReward) { haptic('error'); return; }
        haptic('light');
        setState(s => ({ ...s, rewards: [...(s.rewards || []), { id: Date.now(), text: newReward, cost: parseInt(newCost), redeemed: false }] }));
        setNewReward("");
      };

      const redeemReward = (r) => {
        if (r.redeemed) return;
        setState(s => {
          if ((s.points || 0) >= r.cost) {
            haptic('success');
            setCelebratingId(r.id);
            setTimeout(() => setCelebratingId(null), 1500);
            
            const updatedRewards = (s.rewards || []).map(item => item.id === r.id ? { ...item, redeemed: true } : item);
            return { ...s, points: s.points - r.cost, rewards: updatedRewards };
          }
          haptic('error');
          showToast("Not enough points for this reward.", "error");
          return s;
        });
      };

      return (
        <div className="animate-in">
          <PageHeader
            eyebrow="Incentives & morale"
            title="Rewards System"
            description="Redeem points for treats you define — earned from study hours and completed tasks."
          />

          <div className="card" style={{ textAlign: 'center', padding: '40px' }}>
            <span className="subtitle" style={{ marginBottom: 12 }}>Available Resources (Points)</span>
            <div className="font-syne" style={{ fontSize: 72, fontWeight: 800, color: "var(--accent)", lineHeight: 1 }}>{state.points || 0}</div>
            <div style={{ fontSize: 13, color: "var(--text-dim)", marginTop: 16 }}>Earn points by logging hours (+10/hr) and completing tasks (+5/task).</div>
          </div>

          <div className="card">
            <span className="subtitle" style={{ marginBottom: 16 }}>Available Rewards</span>
            <div style={{ display: "flex", gap: 12, marginBottom: 32 }}>
              <input className="input-base" placeholder="Define reward..." value={newReward} onChange={e=>{setNewReward(e.target.value); haptic('tick');}} onKeyDown={e=>e.key==='Enter'&&handleAddReward()} />
              <input className="input-base font-mono" type="number" style={{ width: 120 }} value={newCost} onChange={e=>{setNewCost(e.target.value); haptic('tick');}} />
              <button className="btn primary" style={{ width: "auto", padding: "12px 32px" }} onClick={handleAddReward}>Add Reward</button>
            </div>
            
            <div className="grid-2">
              {(state.rewards || []).map((r, i) => (
                <div key={r.id} className={`stagger-item ${celebratingId === r.id ? "celebrating" : ""}`} style={{ animationDelay: `${i * 0.1}s`, position: "relative", display: "flex", flexDirection: "column", gap: 16, background: "var(--bg2)", padding: "24px", borderRadius: 12, transition: "all 0.3s", opacity: r.redeemed ? 0.4 : 1, border: "1px solid var(--border)" }}>
                  {celebratingId === r.id && <div className="particle" style={{ left: '50%', top: '20%' }}>🎉</div>}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ fontSize: 16, fontWeight: 600, textDecoration: r.redeemed ? "line-through" : "none" }}>{r.text}</div>
                    <button onClick={()=>{haptic('heavy'); setState(s=>({...s, rewards: s.rewards.filter(x=>x.id!==r.id)}))}} className="action-btn delete" style={{ background: "none", border: "none", color: "var(--danger)", cursor: "pointer", fontSize: 16, marginTop: -4 }}>✕</button>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: "auto" }}>
                    <span className="font-mono" style={{ color: "var(--accent)", fontWeight: 700, fontSize: 18 }}>{r.cost} pts</span>
                    {!r.redeemed && (
                      <button className="btn primary" style={{ padding: "8px 24px", fontSize: 11, width: "auto" }} onClick={() => redeemReward(r)}>REDEEM</button>
                    )}
                    {r.redeemed && (
                       <span style={{ fontSize: 11, color: "var(--success)", fontWeight: 800, padding: "8px 0", letterSpacing: "0.05em" }}>CLAIMED</span>
                    )}
                  </div>
                </div>
              ))}
            </div>
            {(!state.rewards || state.rewards.length === 0) && (
              <div className="empty-state">
                <div className="empty-state-icon">🎁</div>
                <div className="empty-state-title">No rewards yet</div>
                <p className="empty-state-desc">Create a reward and set how many points it costs.</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── VIEW 7: ANALYTICS (HEATMAP & CHARTS) ───
    function AnalyticsView({ sessions, dailyGoal }) {
      const [timeframe, setTimeframe] = useState('weekly'); 
      const [lineTimeframe, setLineTimeframe] = useState('week');
      const [selectedSubject, setSelectedSubject] = useState(null);
      const goal = dailyGoal ?? DEFAULT_DAILY_GOAL;

      const subjectTotals = useMemo(() => {
        const map = {};
        SUBJECTS.forEach(s => { map[s] = 0; });
        sessions.forEach(s => {
          map[s.subject] = (map[s.subject] || 0) + s.hours;
        });
        return SUBJECTS.map(subject => ({ subject, hours: map[subject] || 0 }))
          .sort((a, b) => b.hours - a.hours);
      }, [sessions]);

      const subjectSessions = useMemo(() => {
        if (!selectedSubject) return [];
        return sessions.filter(s => s.subject === selectedSubject);
      }, [sessions, selectedSubject]);

      const subjectLineData = useMemo(() => {
        if (!selectedSubject) return [];
        const data = [];
        for (let i = 29; i >= 0; i--) {
          const dStr = getPastDateStr(i);
          const hrs = sessions
            .filter(s => s.date === dStr && s.subject === selectedSubject)
            .reduce((a, b) => a + b.hours, 0);
          data.push({ date: dStr, value: hrs });
        }
        return data;
      }, [sessions, selectedSubject]);

      const subjectTypeBreakdown = useMemo(() => {
        const map = {};
        subjectSessions.forEach(s => {
          const t = s.type || "General";
          map[t] = (map[t] || 0) + s.hours;
        });
        return Object.entries(map).sort((a, b) => b[1] - a[1]);
      }, [subjectSessions]);

      const subjectLast7 = useMemo(() => {
        const days = Array.from({ length: 7 }, (_, i) => getPastDateStr(i));
        return subjectSessions
          .filter(s => days.includes(s.date))
          .reduce((a, s) => a + s.hours, 0);
      }, [subjectSessions]);

      const lineDays = lineTimeframe === 'week' ? 7 : 30;
      const lineData = useMemo(() => {
        const data = [];
        for (let i = lineDays - 1; i >= 0; i--) {
          const dStr = getPastDateStr(i);
          const hrs = sessions.filter(s => s.date === dStr).reduce((a, b) => a + b.hours, 0);
          data.push({ date: dStr, value: hrs });
        }
        return data;
      }, [sessions, lineDays]);

      const renderLineChart = (data, daysCount, showGoalLine = true) => {
        const w = 800, h = 180;
        const maxVal = Math.max(...data.map(d => d.value), showGoalLine ? goal : 0, 1);
        const denom = Math.max(daysCount - 1, 1);
        const pts = data.map((d, i) => {
          const x = (i / denom) * w;
          const y = h - (d.value / maxVal) * h;
          return {x, y, ...d};
        });
        const pointsStr = pts.map(p => `${p.x},${p.y}`).join(' ');

        return (
          <div style={{ position: 'relative', width: '100%', height: `${h}px`, marginTop: '20px' }}>
            <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
               <line x1="0" y1={h} x2={w} y2={h} stroke="var(--border)" strokeWidth="1" />
               <line x1="0" y1={h/2} x2={w} y2={h/2} stroke="var(--border)" strokeWidth="1" strokeDasharray="4 4" />
               {showGoalLine && (
                 <line x1="0" y1={h - (goal/maxVal)*h} x2={w} y2={h - (goal/maxVal)*h} stroke="var(--success)" strokeWidth="1" strokeDasharray="2 2" opacity="0.5" />
               )}
               <polyline points={pointsStr} fill="none" stroke="var(--accent)" strokeWidth="2" style={{ transition: "all 0.5s cubic-bezier(0.16, 1, 0.3, 1)" }} />
               {pts.map((p, i) => (
                  <g key={i} className="chart-pt">
                    <circle cx={p.x} cy={p.y} r="3" fill="var(--bg)" stroke="var(--accent)" strokeWidth="2" style={{ transition: "all 0.5s ease" }} />
                    <title>{p.date}: {p.value.toFixed(1)}h</title>
                  </g>
               ))}
            </svg>
          </div>
        );
      }

      const heatmapDays = useMemo(() => {
        const days = [];
        for (let i = 83; i >= 0; i--) {
          const dStr = getPastDateStr(i);
          const hrs = sessions.filter(s => s.date === dStr).reduce((a, b) => a + b.hours, 0);
          days.push({ date: dStr, hours: hrs });
        }
        return days;
      }, [sessions]);

      const getColorForHours = (h) => {
        if (h === 0) return "var(--bg3)";
        if (h < 3) return "var(--heatmap-1)";
        if (h < 6) return "var(--heatmap-2)";
        if (h < 9) return "var(--heatmap-3)";
        return "var(--accent)";
      };

      const chartData = useMemo(() => {
        if (timeframe === 'weekly') {
          const weeks = [];
          for(let i=7; i>=0; i--) {
            const start = new Date(); start.setDate(start.getDate() - (i*7) - start.getDay() + 1);
            const end = new Date(start); end.setDate(end.getDate() + 6);
            let hrs = 0;
            sessions.forEach(s => {
              const d = new Date(s.date);
              if(d >= start && d <= end) hrs += s.hours;
            });
            weeks.push({ label: `W${8-i}`, value: hrs });
          }
          return weeks;
        } else {
          const months = [];
          for(let i=5; i>=0; i--) {
            const d = new Date(); d.setMonth(d.getMonth() - i);
            const monthStr = d.toISOString().slice(0, 7);
            const label = d.toLocaleString('default', { month: 'short' });
            let hrs = sessions.filter(s => s.date.startsWith(monthStr)).reduce((a,b) => a+b.hours, 0);
            months.push({ label, value: hrs });
          }
          return months;
        }
      }, [sessions, timeframe]);
      
      const maxChartVal = Math.max(...chartData.map(d => d.value), 1);

      return (
        <div className="animate-in">
          <PageHeader
            eyebrow="Intelligence & metrics"
            title="Analytics Engine"
            description="Heatmaps, trends, and per-subject drilldowns for your study campaign."
          />

          <div className="card">
            <span className="subtitle">Subject Drilldown</span>
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>
              Select a subject to inspect 30-day trend, operation mix, and recent sessions.
            </p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: selectedSubject ? 20 : 0 }}>
              {subjectTotals.map(({ subject, hours }) => (
                <button
                  key={subject}
                  type="button"
                  className={`chip${selectedSubject === subject ? " active" : ""}`}
                  onClick={() => {
                    haptic('light');
                    setSelectedSubject(selectedSubject === subject ? null : subject);
                  }}
                >
                  {subject} <span className="font-mono" style={{ opacity: 0.75 }}>({hours.toFixed(1)}h)</span>
                </button>
              ))}
            </div>

            {selectedSubject && (
              <div style={{ borderTop: "1px solid var(--border)", paddingTop: 20 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 12 }}>
                  <h2 className="font-syne" style={{ fontSize: 18, fontWeight: 700 }}>{selectedSubject}</h2>
                  <div style={{ display: "flex", gap: 16, fontSize: 12, color: "var(--text-muted)" }}>
                    <span>All-time: <strong style={{ color: "var(--text)" }}>{subjectSessions.reduce((a, s) => a + s.hours, 0).toFixed(1)}h</strong></span>
                    <span>Last 7d: <strong style={{ color: "var(--accent)" }}>{subjectLast7.toFixed(1)}h</strong></span>
                  </div>
                </div>

                {subjectSessions.length === 0 ? (
                  <div className="empty-state" style={{ padding: "24px 12px" }}>
                    <div className="empty-state-icon">📊</div>
                    <div className="empty-state-title">No data for {selectedSubject}</div>
                    <p className="empty-state-desc">Log hours in Deploy with this subject to see trends.</p>
                  </div>
                ) : (
                  <>
                    <div style={{ marginBottom: 20 }}>
                      <span style={{ fontSize: 10, color: "var(--text-dim)", textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 700 }}>30-day hours</span>
                      {renderLineChart(subjectLineData, 30, false)}
                    </div>

                    <div className="grid-2" style={{ marginBottom: 16 }}>
                      <div>
                        <span style={{ fontSize: 10, color: "var(--text-dim)", textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 700, display: "block", marginBottom: 10 }}>By operation type</span>
                        {subjectTypeBreakdown.map(([type, hrs]) => {
                          const total = subjectSessions.reduce((a, s) => a + s.hours, 0) || 1;
                          const pct = Math.round((hrs / total) * 100);
                          return (
                            <div key={type} style={{ marginBottom: 10 }}>
                              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                                <span style={{ color: "var(--text-muted)" }}>{type}</span>
                                <span className="font-mono" style={{ color: "var(--text)" }}>{hrs.toFixed(1)}h ({pct}%)</span>
                              </div>
                              <div style={{ height: 6, background: "var(--bg3)", borderRadius: 99, overflow: "hidden" }}>
                                <div style={{ height: "100%", width: `${pct}%`, background: "var(--accent)", borderRadius: 99 }} />
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      <div>
                        <span style={{ fontSize: 10, color: "var(--text-dim)", textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 700, display: "block", marginBottom: 10 }}>Recent sessions</span>
                        {subjectSessions.slice().reverse().slice(0, 8).map(s => (
                          <div key={s.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid var(--border)", fontSize: 12 }}>
                            <span style={{ color: "var(--text-muted)" }}>{s.type || "General"} · {s.date}</span>
                            <span className="font-mono" style={{ color: "var(--accent)", fontWeight: 600 }}>{s.hours}h</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </>
                )}
              </div>
            )}
          </div>

          <div className="card static stagger-item">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, marginBottom: 8 }}>
              <span className="subtitle" style={{ margin: 0 }}>Daily Hours Activity</span>
              <SegControl
                value={lineTimeframe}
                onChange={(id) => { setLineTimeframe(id); haptic('light'); }}
                options={[{ id: 'week', label: 'Week' }, { id: 'month', label: 'Month' }]}
              />
            </div>
            {renderLineChart(lineData, lineDays, true)}
          </div>

          <div className="grid-2">
            <div className="card stagger-item" style={{ animationDelay: '0.1s' }}>
              <span className="subtitle">12-Week Theater Activity</span>
              <div className="heatmap-grid" style={{ overflowX: "auto", paddingBottom: 8 }}>
                {heatmapDays.map((d, i) => (
                  <div key={i} className="heat-cell" style={{ background: getColorForHours(d.hours) }} title={`${d.date}: ${d.hours}h`} />
                ))}
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 4, marginTop: 12, fontSize: 10, color: "var(--text-dim)" }}>
                Less <div style={{width: 10, height: 10, background: getColorForHours(0), borderRadius: 2}}></div>
                <div style={{width: 10, height: 10, background: getColorForHours(3), borderRadius: 2}}></div>
                <div style={{width: 10, height: 10, background: getColorForHours(7), borderRadius: 2}}></div>
                <div style={{width: 10, height: 10, background: getColorForHours(10), borderRadius: 2}}></div> More
              </div>
            </div>

            <div className="card static stagger-item" style={{ animationDelay: '0.2s' }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, marginBottom: 8 }}>
                <span className="subtitle" style={{ margin: 0 }}>Deployment Trends</span>
                <SegControl
                  value={timeframe}
                  onChange={(id) => { setTimeframe(id); haptic('light'); }}
                  options={[{ id: 'weekly', label: 'Weekly' }, { id: 'monthly', label: 'Monthly' }]}
                />
              </div>
              
              <div className="bar-chart-container">
                {chartData.map((d, i) => (
                  <div key={i} className="bar-wrapper" style={{ transitionDelay: `${i * 0.05}s` }}>
                    <div className="bar" style={{ height: `${(d.value / maxChartVal) * 100}%` }}>
                      <div className="bar-value font-mono">{d.value.toFixed(0)}</div>
                    </div>
                    <div className="bar-label">{d.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

            </div>

            <div className="card stagger-item" style={{ animationDelay: '0.4s' }}>
              <span className="subtitle">Performance Trend (Accuracy %)</span>
              {tests.length === 0 ? (
                <div className="empty-state" style={{ padding: "32px 12px" }}>
                  <div className="empty-state-icon">📐</div>
                  <div className="empty-state-title">No test data yet</div>
                  <p className="empty-state-desc">Log a mock or sectional to see your accuracy trend.</p>
                </div>
              ) : (
                <div className="bar-chart-container" style={{ paddingTop: 30 }}>
                  {sortedTests.slice(-10).map((t, i) => {
                    const h = (t.percentage / chartMax) * 100;
                    const color = t.percentage >= 70 ? "var(--success)" : t.percentage >= 50 ? "var(--accent)" : "var(--danger)";
                    return (
                      <div key={i} className="bar-wrapper" title={`${t.name}: ${t.percentage.toFixed(1)}%`} style={{ transitionDelay: `${i * 0.05}s` }}>
                        <div className="bar-value font-mono" style={{ color }}>{t.percentage.toFixed(0)}%</div>
                        <div className="bar" style={{ height: `${h}%`, background: color }}></div>
                        <div className="bar-label">{t.date.slice(5)}</div>
                      </div>
                    )
                  })}
                </div>
              )}
            </div>
          </div>

          <div className="card stagger-item" style={{ animationDelay: '0.5s' }}>
            <span className="subtitle">Intelligence Archive</span>
            {tests.length === 0 && (
              <div className="empty-state" style={{ padding: "24px 12px" }}>
                <div className="empty-state-icon">🗂️</div>
                <div className="empty-state-title">Archive empty</div>
                <p className="empty-state-desc">Logged tests will show up here with scores and dates.</p>
              </div>
            )}
            {tests.slice().reverse().map((t, i) => (
              <div key={t.id} className="stagger-item" style={{ animationDelay: `${i * 0.05}s`, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px", background: "var(--bg2)", borderRadius: 8, marginBottom: 8 }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 15, color: "var(--text)" }}>{t.name}</div>
                  <div style={{ fontSize: 12, color: "var(--text-dim)", marginTop: 4 }}>{t.type} · {t.date}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
                  <div style={{ textAlign: "right" }}>
                    <div className="font-mono" style={{ fontSize: 18, fontWeight: 700, color: t.percentage >= 70 ? "var(--success)" : t.percentage >= 50 ? "var(--accent)" : "var(--danger)" }}>{t.percentage.toFixed(1)}%</div>
                    <div className="font-mono" style={{ fontSize: 11, color: "var(--text-muted)" }}>{t.score} / {t.total}</div>
                  </div>
                  <button onClick={() => deleteTest(t.id)} className="action-btn delete" style={{ background: "none", border: "none", color: "var(--text-dim)", cursor: "pointer", fontSize: 16 }}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SettingsView({ state, setState, importData, resetAllData }) {
      const [importMsg, setImportMsg] = useState("");
      const [goalInput, setGoalInput] = useState(String(getDailyGoal(state)));
      const [goalSaved, setGoalSaved] = useState(false);

      useEffect(() => {
        setGoalInput(String(getDailyGoal(state)));
      }, [state.dailyGoalHours]);

      const saveDailyGoal = (value) => {
        const v = typeof value === "number" ? value : parseFloat(goalInput);
        if (!Number.isFinite(v) || v < 1 || v > 16) {
          haptic('error');
          showToast("Daily goal must be between 1 and 16 hours.", "error");
          return;
        }
        const rounded = Math.round(v * 2) / 2;
        setState(s => ({ ...s, dailyGoalHours: rounded }));
        setGoalInput(String(rounded));
        setGoalSaved(true);
        haptic('success');
        showToast(`Daily goal set to ${rounded}h`, "success");
        setTimeout(() => setGoalSaved(false), 2000);
      };

      const exportData = () => {
        haptic('success');
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          data: state
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `grand-strategy-backup-${todayStr()}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast("Backup downloaded.", "success");
      };

      const onImportFile = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          const payload = parsed && typeof parsed === "object" && parsed.data ? parsed.data : parsed;
          if (!payload || typeof payload !== "object" || Array.isArray(payload)) {
            throw new Error("Invalid backup file");
          }
          importData(payload);
          setImportMsg("Backup imported successfully.");
          showToast("Backup imported successfully.", "success");
          haptic('success');
        } catch (err) {
          setImportMsg("Import failed. Please choose a valid backup JSON.");
          showToast("Import failed — check the JSON file.", "error");
          haptic('error');
        } finally {
          e.target.value = "";
        }
      };

      return (
        <div className="animate-in">
          <PageHeader
            eyebrow="Control center"
            title="Settings & Data"
            description="Daily goals, theme, backups, and full reset."
          />

          <div className="grid-2">
            <div className="card">
              <span className="subtitle">Study Goals</span>
              <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>
                Set your daily hour target. Streaks, dashboard progress, and analytics goal lines use this value.
              </p>
              <label style={{ fontSize: 12, color: "var(--text-dim)", display: "block", marginBottom: 8 }}>Daily study goal (hours)</label>
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 14, flexWrap: "wrap" }}>
                <input
                  type="number"
                  className="input-base font-mono"
                  min="1"
                  max="16"
                  step="0.5"
                  value={goalInput}
                  onChange={e => { setGoalInput(e.target.value); haptic('tick'); }}
                  onKeyDown={e => e.key === 'Enter' && saveDailyGoal()}
                  style={{ maxWidth: 120 }}
                />
                <button className="btn primary" style={{ width: "auto", padding: "10px 20px" }} onClick={() => saveDailyGoal()}>Save goal</button>
                {goalSaved && <span style={{ fontSize: 12, color: "var(--success)", fontWeight: 600 }}>Saved</span>}
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {[6, 8, 10, 12].map(h => (
                  <button
                    key={h}
                    type="button"
                    className="btn"
                    style={{
                      width: "auto",
                      padding: "8px 14px",
                      fontSize: 12,
                      background: getDailyGoal(state) === h ? "var(--accent-soft)" : "var(--bg2)",
                      borderColor: getDailyGoal(state) === h ? "var(--accent-mid)" : "var(--border)",
                    }}
                    onClick={() => saveDailyGoal(h)}
                  >
                    {h}h
                  </button>
                ))}
              </div>
              <p style={{ fontSize: 11, color: "var(--text-dim)", marginTop: 12 }}>
                Weekly target is automatically {getDailyGoal(state) * 7}h (7 × daily goal).
              </p>
            </div>

            <div className="card">
              <span className="subtitle">Appearance</span>
              <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>
                Switch between light and dark mode. Your choice is saved on this device.
              </p>
              <ThemeToggle />
            </div>
          </div>

          <div className="grid-2">
            <div className="card">
              <span className="subtitle">Backup & Restore</span>
              <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>
                Export your complete strategy data to JSON, then restore it anytime on this or another device.
              </p>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
                <button className="btn primary" style={{ width: "auto", padding: "10px 18px" }} onClick={exportData}>Export Backup</button>
                <label className="btn" style={{ width: "auto", padding: "10px 18px", cursor: "pointer" }}>
                  Import Backup
                  <input type="file" accept=".json,application/json" onChange={onImportFile} style={{ display: "none" }} />
                </label>
              </div>
              {importMsg && <div style={{ fontSize: 12, color: "var(--text-dim)" }}>{importMsg}</div>}
            </div>

            <div className="card">
              <span className="subtitle">Danger Zone</span>
              <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>
                Reset will wipe all sessions, tests, planner tasks, rewards, progress and streaks.
              </p>
              <button className="btn" style={{ width: "auto", color: "var(--danger)", borderColor: "var(--danger-soft)" }} onClick={resetAllData}>
                Reset All Data
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[PWA] SW registered:', reg.scope))
          .catch(err => console.warn('[PWA] SW failed:', err));
      });
    }
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e;
      const b = document.getElementById('install-banner');
      if (b) b.style.display = 'flex';
    });
    window.addEventListener('appinstalled', () => {
      const b = document.getElementById('install-banner');
      if (b) b.style.display = 'none';
      deferredPrompt = null;
    });
    function installPWA() {
      if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; }); }
    }
    function dismissBanner() {
      const b = document.getElementById('install-banner');
      if (b) b.style.display = 'none';
    }
  </script>

  <div id="install-banner" class="install-banner">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="app-logo" style="width:36px;height:36px;font-size:18px;border-radius:8px;">G</div>
      <div>
        <div class="install-banner-title">Install Grand Strategy</div>
        <div class="install-banner-sub">Add to home screen for offline access</div>
      </div>
    </div>
    <div class="install-banner-actions">
      <button type="button" class="btn" style="width:auto;padding:8px 14px;" onclick="dismissBanner()">Not now</button>
      <button type="button" class="btn primary" style="width:auto;padding:8px 14px;" onclick="installPWA()">Install</button>
    </div>
  </div>
</body>
</html>
